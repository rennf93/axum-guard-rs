"area: middleware":
  - changed-files:
      - any-glob-to-any-file:
          - src/lib.rs
          - src/middleware.rs
          - src/middleware/**
          - src/layer.rs
          - src/service.rs

"area: extractors":
  - changed-files:
      - any-glob-to-any-file:
          - src/extractors.rs
          - src/extractors/**

"area: types":
  - changed-files:
      - any-glob-to-any-file:
          - src/types.rs
          - src/types/**

tests:
  - changed-files:
      - any-glob-to-any-file:
          - tests/**

examples:
  - changed-files:
      - any-glob-to-any-file:
          - examples/**

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - README.md
          - CHANGELOG.md
          - CONTRIBUTING.md
          - SECURITY.md
          - CODE_OF_CONDUCT.md
          - LICENSE

ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**
          - .pre-commit-config.yaml

build:
  - changed-files:
      - any-glob-to-any-file:
          - Makefile
          - Dockerfile
          - compose.yml
          - rustfmt.toml
          - deny.toml

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - Cargo.toml
          - Cargo.lock
